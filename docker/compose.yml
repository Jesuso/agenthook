# Tunnel-agnostic deploy. Put the receiver behind whatever gives it a stable
# public HTTPS URL (Caddy/Traefik/Cloudflare Tunnel/a load balancer), then run
# `node src/cli.js register https://your-stable-url` once.
#
# Mounts (not baked into the image so no secrets leak):
#   - config.json / INSTRUCTIONS.md : your local config + standing instructions
#   - tokens                        : provider API token(s)
#   - the target repo               : where agents create worktrees + work
services:
  agenthook:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "4123:4123"
    volumes:
      - ../config.json:/app/config.json:ro
      - ../INSTRUCTIONS.md:/app/INSTRUCTIONS.md:ro
      - ./.runtime:/app/.runtime
      - ./logs:/app/logs
      # provider token(s) — match tokenFile paths in config.json
      - ${HOME}/.asana_token:/root/.asana_token:ro
      # the repo agents work in (worktrees are created as siblings)
      - ${TARGET_REPO:-/path/to/repo}:/workspace/repo
    restart: unless-stopped
