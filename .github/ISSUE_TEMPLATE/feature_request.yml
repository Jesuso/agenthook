name: Feature request
description: Suggest a capability or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that agenthook makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see. For a new tracker/ingress, note that it's one adapter file — see docs/providers.md.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This keeps the engine blind to the tracker/ingress (no engine changes), or I've explained why engine changes are needed.
